---

urdf: /home/ros/share/mantis_ws/mantis.urdf
srdf: /home/ros/share/mantis_ws/mantis.srdf
ee_frame: left_tool0
arm: [left_shoulder_pan_joint, left_shoulder_lift_joint, left_elbow_joint, left_wrist_1_joint,left_wrist_2_joint,left_wrist_3_joint]
arm_cmd_joints: [left_shoulder_pan_joint, left_shoulder_lift_joint, left_elbow_joint, left_wrist_1_joint,left_wrist_2_joint,left_wrist_3_joint,right_shoulder_pan_joint, right_shoulder_lift_joint, right_elbow_joint, right_wrist_1_joint,right_wrist_2_joint,right_wrist_3_joint]
gripper_joint: ""

rate: 100.0

ik:
  position_cost: 1.0
  orientation_cost: 0.2
  lm_damping: 0.001
  task_gain: 0.8
  posture_cost: 0.02
  vel_scale: 0.9
  collision_margin: 0.01

teleop:
  scale: 1.0
  az_gain: 1.0
  reach_lo_frac: 0.10
  reach_hi_frac: 0.95
  axis_sign: [-1.0, -1.0, 1.0]
  axis_map: [2, 0, 1]

home:
  time: 3.0
  q: [0.0, -1.2, 1.5, -1.5, -1.57, 0.0]

gripper:
  grip_open: 0.0
  grip_close: 1.1
  trig_timeout: 0.15
  trig_hold: 0.15
  effort: 5.0
  action: /left_gripper_controller/gripper_cmd

topics:
  arm_cmd: /forward_position_controller/commands
  joint_states: /joint_states

rlimits: {}
